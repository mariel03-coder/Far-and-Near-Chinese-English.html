<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pokémon English Spelling Battle!</title>
    <style>
        :root {
            --p1-color: #3498db;
            --p2-color: #e74c3c;
        }
        body {
            margin: 0; padding: 0; overflow: hidden;
            font-family: 'Arial Black', Gadget, sans-serif;
            background: #1a1a1a; color: white;
            user-select: none; touch-action: none;
        }
        
        #game-screen { display: flex; width: 100vw; height: 100vh; }
        .player-side { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: start; position: relative; padding: 20px; border: 5px solid; }
        #p1 { border-color: var(--p1-color); background: radial-gradient(#2980b9, #1a1a1a); }
        #p2 { border-color: var(--p2-color); background: radial-gradient(#c0392b, #1a1a1a); }
        
        .score-board { font-size: 28px; font-weight: bold; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 20px; }
        
        .pokemon-display { margin: 20px 0; text-align: center; }
        .pokemon-img { max-width: 130px; height: auto; filter: drop-shadow(0 0 10px rgba(255,255,255,0.5)); }
        
        /* The Chinese Hint Box */
        .chinese-hint {
            font-size: 50px;
            background: #fff;
            color: #333;
            padding: 10px 30px;
            border-radius: 15px;
            margin: 10px 0;
            border: 4px solid #f1c40f;
            box-shadow: 0 4px 0 #95a5a6;
        }

        .spelling-display {
            font-size: 55px;
            letter-spacing: 12px;
            margin: 20px 0;
            min-height: 65px;
            border-bottom: 4px dashed #fff;
            text-transform: uppercase;
            color: #f1c40f;
        }

        .letter-container { display: flex; gap: 12px; margin-top: auto; padding-bottom: 40px; flex-wrap: wrap; justify-content: center;}
        .letter-btn {
            width: 65px; height: 65px;
            background: #fdfdfd; color: #2c3e50;
            border: 4px solid #bdc3c7; border-radius: 12px;
            font-size: 35px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 5px #7f8c8d;
        }
        .letter-btn:active { transform: translateY(3px); box-shadow: 0 2px #7f8c8d; }
        .letter-btn.disabled { opacity: 0.3; pointer-events: none; }

        #start-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; text-align: center;
        }
        h1 { font-size: 50px; color: #f1c40f; -webkit-text-stroke: 1.5px #3498db; margin-bottom: 10px; }
        .correct { color: #2ecc71; transform: scale(1.1); transition: 0.2s; }
        .error { color: #e74c3c; animation: shake 0.3s; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>POKÉMON SPELLING</h1>
        <p style="font-size: 22px;">See Chinese ➔ Spell English!</p>
        <p>近 = NEAR | 远 = FAR</p>
        <button id="start-btn" onclick="startGame()" style="padding: 20px 60px; font-size: 25px; background: #2ecc71; color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 6px #27ae60;">START BATTLE</button>
    </div>

    <div id="game-screen">
        <div class="player-side" id="p1">
            <div class="score-board">P1 Score: <span id="p1-score">0</span></div>
            <div class="pokemon-display">
                <img id="p1-img" class="pokemon-img" src="https://assets.pokemon.com/assets/cms2/img/pokedex/full/025.png">
                <div id="p1-hint" class="chinese-hint">近</div>
            </div>
            <div id="p1-spell" class="spelling-display">____</div>
            <div class="letter-container" id="p1-btns"></div>
        </div>

        <div class="player-side" id="p2">
            <div class="score-board">P2 Score: <span id="p2-score">0</span></div>
            <div class="pokemon-display">
                <img id="p2-img" class="pokemon-img" src="https://assets.pokemon.com/assets/cms2/img/pokedex/full/150.png">
                <div id="p2-hint" class="chinese-hint">远</div>
            </div>
            <div id="p2-spell" class="spelling-display">____</div>
            <div class="letter-container" id="p2-btns"></div>
        </div>
    </div>

    <audio id="bgMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3"></audio>
    <audio id="sfx-ok" src="https://actions.google.com/sounds/v1/cartoon/clink_vibrant.ogg"></audio>
    <audio id="sfx-no" src="https://actions.google.com/sounds/v1/cartoon/boing.ogg"></audio>
    <audio id="sfx-win" src="https://actions.google.com/sounds/v1/sci-fi/robot_power_up.ogg"></audio>

<script>
    const data = {
        scores: { p1: 0, p2: 0 },
        currentWord: '',
        inputs: { p1: '', p2: '' },
        active: false,
        words: [
            { en: 'NEAR', zh: '近', img: 'https://assets.pokemon.com/assets/cms2/img/pokedex/full/025.png' }, // Pikachu
            { en: 'FAR', zh: '远', img: 'https://assets.pokemon.com/assets/cms2/img/pokedex/full/150.png' }   // Mewtwo
        ]
    };

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('bgMusic').play();
        document.getElementById('bgMusic').volume = 0.2;
        nextRound();
    }

    function nextRound() {
        data.active = true;
        data.inputs.p1 = '';
        data.inputs.p2 = '';

        const choice = data.words[Math.floor(Math.random() * data.words.length)];
        data.currentWord = choice.en;

        // Update visuals
        ['p1', 'p2'].forEach(p => {
            document.getElementById(`${p}-hint`).innerText = choice.zh;
            document.getElementById(`${p}-img`).src = choice.img;
            document.getElementById(`${p}-spell`).innerText = '_'.repeat(choice.en.length);
            document.getElementById(`${p}-spell`).className = 'spelling-display';
            setupButtons(p);
        });
    }

    function setupButtons(player) {
        const container = document.getElementById(`${player}-btns`);
        container.innerHTML = '';
        
        // Add correct letters + some random letters to make it a challenge
        let letters = (data.currentWord + "TOLPK").split('');
        letters = letters.sort(() => Math.random() - 0.5).slice(0, 6); // Pick 6 random including correct ones

        // Ensure all required letters are actually there
        data.currentWord.split('').forEach(l => {
            if(!letters.includes(l)) letters.push(l);
        });

        letters.forEach(char => {
            const b = document.createElement('div');
            b.className = 'letter-btn';
            b.innerText = char;
            b.addEventListener('pointerdown', () => checkLetter(player, char, b));
            container.appendChild(b);
        });
    }

    function checkLetter(player, char, btn) {
        if (!data.active) return;

        const currentInput = data.inputs[player];
        const nextNeeded = data.currentWord[currentInput.length];

        if (char === nextNeeded) {
            data.inputs[player] += char;
            document.getElementById('sfx-ok').play();
            updateDisplay(player);
            btn.classList.add('disabled');

            if (data.inputs[player] === data.currentWord) {
                data.active = false;
                winRound(player);
            }
        } else {
            document.getElementById('sfx-no').play();
            const el = document.getElementById(`${player}-spell`);
            el.classList.add('error');
            setTimeout(() => el.classList.remove('error'), 300);
        }
    }

    function updateDisplay(player) {
        const input = data.inputs[player];
        const blanks = '_'.repeat(data.currentWord.length - input.length);
        document.getElementById(`${player}-spell`).innerText = input + blanks;
    }

    function winRound(winner) {
        document.getElementById('sfx-win').play();
        document.getElementById(`${winner}-spell`).classList.add('correct');
        data.scores[winner]++;
        document.getElementById(`${winner}-score`).innerText = data.scores[winner];
        setTimeout(nextRound, 2000);
    }
</script>
</body>
</html>
